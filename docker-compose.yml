version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CANONICAL_WEB_ORIGIN: ${CANONICAL_WEB_ORIGIN}
      API_PUBLIC_ORIGIN: ${API_PUBLIC_ORIGIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      PORT: 3005
    ports:
      - "3005:3005"
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${API_PUBLIC_ORIGIN}/api
      NEXT_PUBLIC_APP_URL: ${CANONICAL_WEB_ORIGIN}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db-data:
